<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Solar System Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --sky:#03050d;
  --blue:#38bdf8;
  --purple:#7c3aed;
  --gold:#f59e0b;
  /* Responsive orbit radii */
  --r1: clamp(30px, 7vmin, 55px);
  --r2: clamp(46px, 11vmin, 86px);
  --r3: clamp(62px, 15vmin, 116px);
  --r4: clamp(80px, 20vmin, 150px);
  --r5: clamp(99px, 26vmin, 199px);
  --r6: clamp(116px, 33vmin, 248px);
  --r7: clamp(130px, 39vmin, 296px);
  --r8: clamp(144px, 46vmin, 345px);
  /* Planet sizes */
  --ps-mercury: clamp(5px, 1.2vmin, 9px);
  --ps-venus:   clamp(8px, 2.0vmin, 15px);
  --ps-earth:   clamp(9px, 2.4vmin, 18px);
  --ps-mars:    clamp(7px, 1.8vmin, 14px);
  --ps-jupiter: clamp(14px, 4.0vmin, 38px);
  --ps-saturn:  clamp(12px, 3.5vmin, 32px);
  --ps-uranus:  clamp(10px, 3.0vmin, 24px);
  --ps-neptune: clamp(10px, 2.8vmin, 22px);
}

html,body{
  width:100%;
  min-height:100vh;
  height:100%;
  overflow:hidden;
  background:var(--sky);
  font-family:'Rajdhani',sans-serif;
}

/* ── DESKTOP CURSOR ONLY ── */
@media (hover: hover) and (pointer: fine) {
  body { cursor: none; }
  #cur-system { display: block; }
}
@media (hover: none), (pointer: coarse) {
  #cur-system { display: none !important; }
}

#cur-system {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 0; height: 0;
  pointer-events: none;
  z-index: 99999;
}
#cur-dot {
  position: absolute;
  width: 6px; height: 6px;
  background: #ffffff;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 10px #fff, 0 0 20px rgba(56,189,248,.5);
}
#cur-ring {
  position: absolute;
  width: 38px; height: 38px;
  border: 1px dashed rgba(56,189,248,.4);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width .25s, height .25s, border-color .25s;
  animation: cursorOrbitSpin 3s linear infinite;
}
#cur-moon {
  position: absolute;
  top: -3px; left: 50%;
  width: 5px; height: 5px;
  background: var(--blue);
  border-radius: 50%;
  transform: translateX(-50%);
  box-shadow: 0 0 8px var(--blue);
}
body.hov #cur-ring { width:56px; height:56px; border-color:rgba(245,158,11,.6); }
body.hov #cur-moon { background:var(--gold); box-shadow:0 0 8px var(--gold); }
body.click #cur-ring { width:20px; height:20px; border-color:#e879f9; }
@keyframes cursorOrbitSpin {
  from { transform:translate(-50%,-50%) rotate(0deg); }
  to   { transform:translate(-50%,-50%) rotate(360deg); }
}

/* ── STARFIELD ── */
#starfield { position:fixed; inset:0; z-index:0; }

/* ── SOLAR SYSTEM ── */
#solar {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1;
}

#solar-inner {
  position: relative;
  width: 0;
  height: 0;
}

#sun {
  position: absolute;
  width: clamp(28px, 8.5vmin, 64px);
  height: clamp(28px, 8.5vmin, 64px);
  border-radius: 50%;
  transform: translate(-50%,-50%);
  background: radial-gradient(circle at 38% 32%, #fffde7, #fbbf24 38%, #f59e0b 68%, #92400e);
  box-shadow: 0 0 3vmin 1vmin rgba(251,191,36,.55), 0 0 8vmin 3vmin rgba(245,158,11,.28), 0 0 15vmin 6vmin rgba(234,88,12,.1);
  animation: sunPulse 4s ease-in-out infinite;
  z-index: 2;
}
@keyframes sunPulse {
  0%,100%{ box-shadow:0 0 3vmin 1vmin rgba(251,191,36,.55),0 0 8vmin 3vmin rgba(245,158,11,.28),0 0 15vmin 6vmin rgba(234,88,12,.1); }
  50%    { box-shadow:0 0 4.5vmin 2vmin rgba(251,191,36,.7),0 0 11vmin 4vmin rgba(245,158,11,.38),0 0 18vmin 8vmin rgba(234,88,12,.15); }
}

/* Orbit rings */
.oring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,.06);
  transform: translate(-50%,-50%) scaleY(0.44);
  top: 50%; left: 50%;
}

/* Planet arm + body */
.parm {
  position: absolute;
  top: 50%; left: 50%;
  width: 0; height: 0;
  transform-origin: 0 0;
  animation-timing-function: linear;
  animation-iteration-count: infinite;
}
@keyframes rev  { from{transform:rotate(0deg);}   to{transform:rotate(360deg);} }
@keyframes crev { from{transform:rotate(0deg);}   to{transform:rotate(-360deg);} }

.parm-mercury { animation: rev   6s   linear infinite; }
.parm-venus   { animation: rev   9.5s linear infinite; }
.parm-earth   { animation: rev   14s  linear infinite; }
.parm-mars    { animation: rev   21s  linear infinite; }
.parm-jupiter { animation: rev   34s  linear infinite; }
.parm-saturn  { animation: rev   52s  linear infinite; }
.parm-uranus  { animation: rev   74s  linear infinite; }
.parm-neptune { animation: rev  106s  linear infinite; }

.pbody {
  position: absolute;
  border-radius: 50%;
  transform: translateY(-50%);
}
.pbody-mercury { animation: crev   6s   linear infinite; }
.pbody-venus   { animation: crev   9.5s linear infinite; }
.pbody-earth   { animation: crev   14s  linear infinite; }
.pbody-mars    { animation: crev   21s  linear infinite; }
.pbody-jupiter { animation: crev   34s  linear infinite; }
.pbody-saturn  { animation: crev   52s  linear infinite; }
.pbody-uranus  { animation: crev   74s  linear infinite; }
.pbody-neptune { animation: crev  106s  linear infinite; }

.mercury-v { width:var(--ps-mercury); height:var(--ps-mercury); background:radial-gradient(circle at 35% 30%,#d1d5db,#4b5563); }
.venus-v   { width:var(--ps-venus);   height:var(--ps-venus);   background:radial-gradient(circle at 35% 28%,#fef9c3,#d97706,#451a03); }
.earth-v   { width:var(--ps-earth);   height:var(--ps-earth);   background:radial-gradient(circle at 35% 30%,#7dd3fc,#2563eb 55%,#0f172a); box-shadow:0 0 1vmin rgba(56,189,248,.45); }
.mars-v    { width:var(--ps-mars);    height:var(--ps-mars);    background:radial-gradient(circle at 30% 30%,#fb923c,#7f1d1d); }
.jupiter-v { width:var(--ps-jupiter); height:var(--ps-jupiter); background:repeating-linear-gradient(to bottom,#92400e 0%,#fef3c7 11%,#78350f 22%,#fef08a 33%,#a16207 44%,#fef3c7 55%,#78350f 66%,#ca8a04 77%,#a16207 88%,#fef3c7 100%); }
.saturn-v  { width:var(--ps-saturn);  height:var(--ps-saturn);  background:radial-gradient(circle at 35% 28%,#fef9c3,#a16207,#78350f); overflow:visible; }
.saturn-v::before {
  content:'';
  position:absolute;
  top:50%; left:50%;
  width: calc(var(--ps-saturn) * 2.1);
  height: calc(var(--ps-saturn) * 0.38);
  border: clamp(1px, 0.3vmin, 2px) solid rgba(234,179,8,.42);
  border-radius: 50%;
  transform: translate(-50%,-50%) rotate(-12deg);
  z-index: -1;
}
.uranus-v  { width:var(--ps-uranus);  height:var(--ps-uranus);  background:radial-gradient(circle at 34% 30%,#a5f3fc,#0891b2,#0c4a6e); box-shadow:0 0 1vmin rgba(6,182,212,.32); }
.neptune-v { width:var(--ps-neptune); height:var(--ps-neptune); background:radial-gradient(circle at 34% 30%,#93c5fd,#1d4ed8,#0f172a); }

/* Planet labels — hidden on very small screens */
.plabel {
  position: absolute;
  top: calc(100% + 4px);
  left: 50%;
  transform: translateX(-50%);
  font-size: clamp(6px, 1vmin, 10px);
  letter-spacing: 1px;
  color: rgba(255,255,255,.3);
  text-transform: uppercase;
  white-space: nowrap;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
}
@media (max-width: 480px) { .plabel { display: none; } }

/* ── CURTAIN ── */
#curtain { position:fixed; inset:0; z-index:50; pointer-events:none; }
#curt-left  { position:absolute; top:0; left:0;  width:50%; height:100%; overflow:hidden; transition:transform 2.0s cubic-bezier(0.76,0,0.24,1); }
#curt-right { position:absolute; top:0; right:0; width:50%; height:100%; overflow:hidden; transition:transform 2.0s cubic-bezier(0.76,0,0.24,1); }
#cloud-L { position:absolute; top:0; left:0; }
#cloud-R { position:absolute; top:0; left:-100%; }
#curtain.open #curt-left  { transform:translateX(-100%); }
#curtain.open #curt-right { transform:translateX(100%); }

/* ── INVITATION WORD ── */
#inv-wrap {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(0.6);
  opacity: 0;
  z-index: 40;
  text-align: center;
  transition: opacity .8s ease, transform 1s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
  width: 90vw;
  max-width: 420px;
  padding: 16px;
}
#inv-wrap.arrive { opacity:1; transform:translate(-50%,-50%) scale(1); pointer-events:auto; }

#inv-btn {
  display: block;
  width: 100%;
  background: transparent;
  border: none;
  font-family: 'Cinzel', serif;
  font-size: clamp(1.9rem, 8vw, 4.5rem);
  font-weight: 900;
  color: #fff;
  letter-spacing: clamp(6px, 2vw, 16px);
  padding-left: clamp(6px, 2vw, 16px);
  text-transform: uppercase;
  cursor: pointer;
  text-shadow: 0 0 22px rgba(255,255,255,.5), 0 0 55px rgba(56,189,248,.42);
  animation: invPulse 3.2s ease-in-out infinite;
  transition: transform .3s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
#inv-btn:hover { transform:scale(1.05); }
@keyframes invPulse {
  0%,100%{ text-shadow:0 0 22px rgba(255,255,255,.5),0 0 55px rgba(56,189,248,.42); }
  50%    { text-shadow:0 0 32px rgba(255,255,255,.7),0 0 75px rgba(56,189,248,.6); }
}
.inv-line {
  margin: 12px auto 0;
  width: 0; height: 1px;
  background: linear-gradient(90deg,transparent,rgba(56,189,248,.7),transparent);
  transition: width 1.2s ease .3s;
}
#inv-wrap.arrive .inv-line { width: min(280px, 80vw); }
.inv-hint {
  margin-top: 10px;
  font-size: clamp(.65rem, 2.5vw, .78rem);
  letter-spacing: 4px;
  color: rgba(255,255,255,.32);
  text-transform: uppercase;
  animation: hintBlink 2.4s ease-in-out infinite;
}
@keyframes hintBlink { 0%,100%{opacity:.32;} 50%{opacity:.72;} }

/* ── CARD ── */
#card {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -45%) scale(0.9);
  width: min(92vw, 520px);
  max-height: 88vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  background: rgba(5,10,22,.95);
  border: 1.5px solid rgba(56,189,248,.45);
  box-shadow: 0 0 50px rgba(56,189,248,.15);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  border-radius: 20px;
  padding: clamp(18px, 5vw, 40px);
  text-align: center;
  z-index: 45;
  opacity: 0;
  pointer-events: none;
  transition: opacity .6s cubic-bezier(.25,1,.5,1), transform .6s cubic-bezier(.25,1,.5,1);
  /* Safe area for notched phones */
  padding-bottom: max(clamp(18px,5vw,40px), env(safe-area-inset-bottom));
}
#card.active { opacity:1; transform:translate(-50%,-50%) scale(1); pointer-events:auto; }

.badge {
  display: inline-block;
  background: linear-gradient(90deg,#0284c7,#7c3aed);
  color: #fff;
  font-size: clamp(.6rem, 2.2vw, .7rem);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  padding: 5px 16px;
  border-radius: 20px;
  margin-bottom: 14px;
}
#card h2 {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.3rem, 5vw, 2.1rem);
  background: linear-gradient(135deg,#fff 20%,#93c5fd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 12px;
  line-height: 1.3;
}
.salutation {
  color: #fff;
  font-size: clamp(.95rem, 3.5vw, 1.15rem);
  font-weight: 600;
  margin-bottom: 8px;
  text-align: left;
  letter-spacing: 1px;
}
#card > .desc {
  color: #cbd5e1;
  font-size: clamp(.9rem, 3.2vw, 1.05rem);
  line-height: 1.7;
  text-align: left;
  margin-bottom: 4px;
}
.dbox {
  background: rgba(255,255,255,.025);
  border: 1px solid rgba(255,255,255,.06);
  border-left: 4px solid #38bdf8;
  border-radius: 12px;
  padding: clamp(12px,3vw,16px) clamp(14px,4vw,20px);
  margin: 16px 0;
  text-align: left;
}
.drow {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  color: #cbd5e1;
  font-size: clamp(.85rem, 3vw, 1rem);
  margin-bottom: 10px;
  line-height: 1.5;
}
.drow:last-child { margin-bottom: 0; }
.dlabel { color: #38bdf8; font-weight: 600; white-space: nowrap; }
.cbtn {
  background: linear-gradient(135deg,#38bdf8,#7c3aed);
  color: #fff;
  border: none;
  padding: clamp(12px,3vw,14px) clamp(24px,6vw,40px);
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(.9rem, 3.2vw, 1rem);
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(124,58,237,.35);
  transition: transform .2s, box-shadow .2s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  width: 100%;
  max-width: 280px;
  margin-top: 4px;
}
.cbtn:hover { transform:translateY(-2px); box-shadow:0 6px 28px rgba(56,189,248,.55); }
.cbtn:active { transform:scale(.97); }

/* ── OUTRO ── */
#outro {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%,-45%);
  text-align: center;
  z-index: 50;
  opacity: 0;
  pointer-events: none;
  transition: opacity .6s, transform .6s;
  padding: 20px;
  width: 90vw;
  max-width: 400px;
}
#outro.active { opacity:1; transform:translate(-50%,-50%); pointer-events:auto; }
#rocket {
  font-size: clamp(3rem, 10vw, 4.5rem);
  display: block;
  margin-bottom: 16px;
}
#rocket.go { animation: blastOff 1.5s forwards ease-in; }
@keyframes blastOff {
  0%  { transform:translateY(0) scale(1); opacity:1; }
  15% { transform:translateY(12px) scale(.93); }
  100%{ transform:translateY(-130vh) scale(1.8); opacity:0; }
}
#outro h2 {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.3rem, 5vw, 1.8rem);
  color: #fff;
  margin-bottom: 8px;
}
#outro p {
  color: #94a3b8;
  font-size: clamp(.8rem, 3vw, .95rem);
  letter-spacing: 1.5px;
  line-height: 1.6;
}
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<div id="solar">
  <div id="solar-inner">
    <div id="sun"></div>
    <!-- Orbit rings sized with CSS vars -->
    <div class="oring" style="width:calc(var(--r1)*2);height:calc(var(--r1)*2);"></div>
    <div class="oring" style="width:calc(var(--r2)*2);height:calc(var(--r2)*2);"></div>
    <div class="oring" style="width:calc(var(--r3)*2);height:calc(var(--r3)*2);"></div>
    <div class="oring" style="width:calc(var(--r4)*2);height:calc(var(--r4)*2);"></div>
    <div class="oring" style="width:calc(var(--r5)*2);height:calc(var(--r5)*2);"></div>
    <div class="oring" style="width:calc(var(--r6)*2);height:calc(var(--r6)*2);"></div>
    <div class="oring" style="width:calc(var(--r7)*2);height:calc(var(--r7)*2);"></div>
    <div class="oring" style="width:calc(var(--r8)*2);height:calc(var(--r8)*2);"></div>

    <div class="parm parm-mercury"><div class="pbody pbody-mercury mercury-v" style="left:var(--r1);"><div class="plabel">Mercury</div></div></div>
    <div class="parm parm-venus">  <div class="pbody pbody-venus   venus-v"   style="left:var(--r2);"><div class="plabel">Venus</div></div></div>
    <div class="parm parm-earth">  <div class="pbody pbody-earth   earth-v"   style="left:var(--r3);"><div class="plabel">Earth</div></div></div>
    <div class="parm parm-mars">   <div class="pbody pbody-mars    mars-v"    style="left:var(--r4);"><div class="plabel">Mars</div></div></div>
    <div class="parm parm-jupiter"><div class="pbody pbody-jupiter jupiter-v" style="left:var(--r5);overflow:visible;"><div class="plabel">Jupiter</div></div></div>
    <div class="parm parm-saturn"> <div class="pbody pbody-saturn  saturn-v"  style="left:var(--r6);overflow:visible;"><div class="plabel">Saturn</div></div></div>
    <div class="parm parm-uranus"> <div class="pbody pbody-uranus  uranus-v"  style="left:var(--r7);"><div class="plabel">Uranus</div></div></div>
    <div class="parm parm-neptune"><div class="pbody pbody-neptune neptune-v" style="left:var(--r8);"><div class="plabel">Neptune</div></div></div>
  </div>
</div>

<div id="inv-wrap">
  <button id="inv-btn" onclick="openCard()">Invitation</button>
  <div class="inv-line"></div>
  <div class="inv-hint">↑ tap to reveal ↑</div>
</div>

<div id="card">
  <div class="badge">Official Invitation</div>
  <h2>Solar System Event</h2>
  <div class="salutation">Dear Sir/Madam,</div>
  <p class="desc">You are invited to our event...</p>
  <div class="dbox">
    <div class="drow"><span>⏰</span><span><span class="dlabel">Time:</span> 8am onwards</span></div>
    <div class="drow"><span>📍</span><span><span class="dlabel">Venue:</span> Auditorium</span></div>
  </div>
  <button class="cbtn" onclick="confirmSeat()">Accept Invitation</button>
</div>

<div id="outro">
  <span id="rocket">🚀</span>
  <h2>Seat Confirmed!</h2>
  <p>Prepare for countdown. See you at the auditorium.</p>
</div>

<div id="curtain">
  <div id="curt-left"><canvas id="cloud-L"></canvas></div>
  <div id="curt-right"><canvas id="cloud-R"></canvas></div>
</div>

<div id="cur-system">
  <div id="cur-ring"><div id="cur-moon"></div></div>
  <div id="cur-dot"></div>
</div>

<script>
/* ── SEEDED RNG ── */
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

/* ── CLOUD DRAWING ENGINE ── */
function drawCloud(ctx, cx, cy, cw, ch) {
  ctx.save();
  const hw = cw / 2;

  // Drop shadow for depth
  ctx.shadowColor = 'rgba(0,20,60,0.38)';
  ctx.shadowBlur  = ch * 0.6;
  ctx.shadowOffsetY = ch * 0.18;

  const cloudGrad = ctx.createLinearGradient(cx, cy - ch * 0.55, cx, cy + ch * 0.45);
  cloudGrad.addColorStop(0,    '#ffffff');
  cloudGrad.addColorStop(0.28, '#f0f8ff');
  cloudGrad.addColorStop(0.62, '#cce0f5');
  cloudGrad.addColorStop(1,    '#8ab6d8');
  ctx.fillStyle = cloudGrad;

  // Base ellipse (flat belly)
  ctx.beginPath();
  ctx.ellipse(cx, cy + ch * 0.05, hw * 0.98, ch * 0.36, 0, 0, Math.PI * 2);
  ctx.fill();

  // Puffy top bumps — varied sizes for organic look
  const bumps = [
    [-0.68,  0.00, 0.32],
    [-0.34, -0.38, 0.52],
    [ 0.06, -0.30, 0.46],
    [ 0.44, -0.16, 0.38],
    [ 0.72, -0.02, 0.28],
  ];
  bumps.forEach(([bx, by, br]) => {
    ctx.beginPath();
    ctx.arc(cx + hw * bx, cy + ch * by, ch * br, 0, Math.PI * 2);
    ctx.fill();
  });

  ctx.restore();
}

// Cloud defs: [xFraction, yFraction, widthFraction, heightFraction]
// widthFraction and heightFraction are relative to the FULL screen W/H
// so they scale perfectly on any viewport — no fixed pixel floors
const CLOUD_DEFS = [
  // Row 1 — near top
  [0.05,  0.04, 0.17, 0.10],
  [0.27,  0.02, 0.22, 0.13],
  [0.55,  0.03, 0.24, 0.14],
  [0.82,  0.03, 0.19, 0.11],
  // Row 2
  [0.02,  0.17, 0.14, 0.09],
  [0.21,  0.15, 0.20, 0.12],
  [0.47,  0.14, 0.23, 0.14],
  [0.73,  0.15, 0.21, 0.13],
  [0.95,  0.16, 0.14, 0.09],
  // Row 3
  [0.10,  0.30, 0.20, 0.12],

function renderClouds(canvas) {
  // Each canvas is the full screen size — the CSS overflow:hidden on the
  // parent half-panel clips correctly, and the right panel uses left:-100%
  const W = window.innerWidth;
  const H = window.innerHeight;
  canvas.width  = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Sky background
  ctx.fillStyle = '#03050d';
  ctx.fillRect(0, 0, W, H);

  // Tiny background stars
  const rng = mulberry32(12345);
  const starCount = Math.round(W * H / 3000); // density scales with area
  for (let i = 0; i < starCount; i++) {
    const x = rng() * W, y = rng() * H;
    const r = rng() * 1.1 + 0.15;
    const a = rng() * 0.65 + 0.15;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.fill();
  }

  // Draw all clouds — sizes purely proportional, no hard pixel floor
  CLOUD_DEFS.forEach(([xf, yf, wf, hf]) => {
    const cw = wf * W;
    const ch = hf * H;
    // Only skip truly microscopic clouds (< 20px wide) on extreme screens
    if (cw < 20) return;
    drawCloud(ctx, xf * W, yf * H, cw, ch);
  });
}

/* ── STARFIELD ── */
(function(){
  const c = document.getElementById('starfield');
  const ctx = c.getContext('2d');
  function resize(){ c.width=innerWidth; c.height=innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const rng = mulberry32(99999);
  const stars = Array.from({length:320}, () => ({
    x:rng()*innerWidth, y:rng()*innerHeight,
    r:rng()*1.5+0.2, a:rng(), speed:rng()*.5+.1, ph:rng()*Math.PI*2
  }));
  function draw(t) {
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s => {
      const a = s.a*(0.45+0.55*Math.sin(t*s.speed+s.ph));
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${a})`; ctx.fill();
    });
    requestAnimationFrame(t2=>draw(t2/1000));
  }
  requestAnimationFrame(t=>draw(t/1000));
})();

/* ── DESKTOP CURSOR ── */
const curSystem = document.getElementById('cur-system');
let mouseX = window.innerWidth/2, mouseY = window.innerHeight/2;
let ringX = mouseX, ringY = mouseY;
document.addEventListener('mousemove', e => { mouseX=e.clientX; mouseY=e.clientY; });
(function animCursorLoop() {
  ringX += (mouseX - ringX) * 0.13;
  ringY += (mouseY - ringY) * 0.13;
  curSystem.style.transform = `translate3d(${ringX}px,${ringY}px,0)`;
  requestAnimationFrame(animCursorLoop);
})();
document.addEventListener('mousedown', () => document.body.classList.add('click'));
document.addEventListener('mouseup',   () => document.body.classList.remove('click'));
function attachHover(els) {
  els.forEach(el => {
    el.addEventListener('mouseenter', () => document.body.classList.add('hov'));
    el.addEventListener('mouseleave', () => document.body.classList.remove('hov'));
  });
}

/* ── INIT ── */
window.addEventListener('DOMContentLoaded', () => {
  const cL = document.getElementById('cloud-L');
  const cR = document.getElementById('cloud-R');
  renderClouds(cL);
  renderClouds(cR);
  attachHover(document.querySelectorAll('button,.cbtn'));
  setTimeout(() => {
    document.getElementById('curtain').classList.add('open');
    setTimeout(() => {
      document.getElementById('inv-wrap').classList.add('arrive');
    }, 1300);
  }, 1800);
});

/* ── ACTIONS ── */
function openCard() {
  const wrapper = document.getElementById('inv-wrap');
  wrapper.style.transition = 'opacity .4s ease, transform .4s ease';
  wrapper.style.opacity = '0';
  wrapper.style.transform = 'translate(-50%,-50%) scale(0.8)';
  wrapper.style.pointerEvents = 'none';
  setTimeout(() => {
    wrapper.style.display = 'none';
    const card = document.getElementById('card');
    card.classList.add('active');
  }, 400);
}

function confirmSeat() {
  document.getElementById('card').classList.remove('active');
  setTimeout(() => {
    const outro = document.getElementById('outro');
    outro.classList.add('active');
    setTimeout(() => document.getElementById('rocket').classList.add('go'), 500);
  }, 700);
}
