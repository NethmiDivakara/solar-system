<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Solar System Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*,*::before,*::after{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --sky:#03050d;
  --blue:#38bdf8;
  --purple:#7c3aed;
  --gold:#f59e0b;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--sky);
  font-family:'Rajdhani',sans-serif;
}

/* ───────── STARFIELD ───────── */

#starfield{
  position:fixed;
  inset:0;
  z-index:0;
}

/* ───────── SOLAR SYSTEM ───────── */

#solar{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:1;
  transition:transform .4s ease;
}

#sun{
  position:absolute;
  width:8vmin;
  height:8vmin;
  border-radius:50%;
  transform:translate(-50%,-50%);

  background:
  radial-gradient(circle at 38% 32%,
  #fffde7,
  #fbbf24 38%,
  #f59e0b 68%,
  #92400e);

  box-shadow:
  0 0 3vmin 1vmin rgba(251,191,36,.55),
  0 0 8vmin 3vmin rgba(245,158,11,.28);

  animation:sunPulse 4s ease-in-out infinite;
}

@keyframes sunPulse{
  0%,100%{
    box-shadow:
    0 0 3vmin 1vmin rgba(251,191,36,.55),
    0 0 8vmin 3vmin rgba(245,158,11,.28);
  }

  50%{
    box-shadow:
    0 0 4.5vmin 2vmin rgba(251,191,36,.75),
    0 0 12vmin 4vmin rgba(245,158,11,.35);
  }
}

.oring{
  position:absolute;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.06);

  transform:
  translate(-50%,-50%)
  scaleY(.44);

  top:50%;
  left:50%;
}

.parm{
  position:absolute;
  top:50%;
  left:50%;

  width:0;
  height:0;

  transform-origin:0 0;

  animation-timing-function:linear;
  animation-iteration-count:infinite;
}

@keyframes rev{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

@keyframes crev{
  from{transform:rotate(0deg);}
  to{transform:rotate(-360deg);}
}

.parm-mercury{animation:rev 6s linear infinite;}
.parm-venus{animation:rev 9s linear infinite;}
.parm-earth{animation:rev 14s linear infinite;}
.parm-mars{animation:rev 20s linear infinite;}
.parm-jupiter{animation:rev 32s linear infinite;}
.parm-saturn{animation:rev 48s linear infinite;}
.parm-uranus{animation:rev 65s linear infinite;}
.parm-neptune{animation:rev 90s linear infinite;}

.pbody{
  position:absolute;
  border-radius:50%;
  transform:translateY(-50%);
}

/* planets */

.mercury-v{
  width:.9vmin;
  height:.9vmin;
  background:radial-gradient(circle,#d1d5db,#4b5563);
}

.venus-v{
  width:1.4vmin;
  height:1.4vmin;
  background:radial-gradient(circle,#fde68a,#b45309);
}

.earth-v{
  width:1.6vmin;
  height:1.6vmin;
  background:radial-gradient(circle,#7dd3fc,#1d4ed8);
}

.mars-v{
  width:1.2vmin;
  height:1.2vmin;
  background:radial-gradient(circle,#fb923c,#7f1d1d);
}

.jupiter-v{
  width:3vmin;
  height:3vmin;

  background:
  repeating-linear-gradient(
  to bottom,
  #92400e 0%,
  #fef3c7 20%,
  #78350f 40%,
  #ca8a04 60%,
  #92400e 100%);
}

.saturn-v{
  width:2.6vmin;
  height:2.6vmin;

  background:
  radial-gradient(circle,#fef3c7,#a16207);

  overflow:visible;
}

.saturn-v::before{
  content:'';

  position:absolute;
  top:50%;
  left:50%;

  width:5.5vmin;
  height:.9vmin;

  border:.2vmin solid rgba(234,179,8,.45);

  border-radius:50%;

  transform:
  translate(-50%,-50%)
  rotate(-12deg);
}

.uranus-v{
  width:2vmin;
  height:2vmin;
  background:radial-gradient(circle,#a5f3fc,#0891b2);
}

.neptune-v{
  width:1.9vmin;
  height:1.9vmin;
  background:radial-gradient(circle,#93c5fd,#1d4ed8);
}

/* orbit rings */

.oring-1{width:10vmin;height:10vmin;}
.oring-2{width:15vmin;height:15vmin;}
.oring-3{width:20vmin;height:20vmin;}
.oring-4{width:26vmin;height:26vmin;}
.oring-5{width:34vmin;height:34vmin;}
.oring-6{width:42vmin;height:42vmin;}
.oring-7{width:50vmin;height:50vmin;}
.oring-8{width:58vmin;height:58vmin;}

/* mobile scaling */

@media(max-width:768px){

  #solar{
    transform:scale(.58);
  }

}

@media(max-width:400px){

  #solar{
    transform:scale(.48);
  }

}

/* ───────── INVITATION ───────── */

#inv-wrap{
  position:fixed;

  top:50%;
  left:50%;

  transform:
  translate(-50%,-50%)
  scale(.7);

  opacity:0;

  z-index:40;

  text-align:center;

  transition:
  opacity .8s ease,
  transform 1s cubic-bezier(.34,1.56,.64,1);

  width:90vw;
}

#inv-wrap.arrive{
  opacity:1;

  transform:
  translate(-50%,-50%)
  scale(1);
}

#inv-btn{

  display:inline-block;

  font-family:'Cinzel',serif;

  font-size:
  clamp(1.1rem,5vw,2.2rem);

  font-weight:900;

  color:#fff;

  letter-spacing:4px;

  text-transform:uppercase;

  cursor:pointer;

  user-select:none;

  text-shadow:
  0 0 18px rgba(255,255,255,.45),
  0 0 40px rgba(56,189,248,.35);

  animation:invPulse 3s ease-in-out infinite;
}

@keyframes invPulse{

  0%,100%{
    text-shadow:
    0 0 18px rgba(255,255,255,.45),
    0 0 40px rgba(56,189,248,.35);
  }

  50%{
    text-shadow:
    0 0 30px rgba(255,255,255,.8),
    0 0 70px rgba(56,189,248,.65);
  }

}

.inv-line{
  margin:12px auto 0;

  width:0;
  height:1px;

  background:
  linear-gradient(
  90deg,
  transparent,
  rgba(56,189,248,.7),
  transparent);

  transition:width 1.2s ease .3s;
}

#inv-wrap.arrive .inv-line{
  width:min(180px,60vw);
}

.inv-hint{
  margin-top:10px;

  font-size:.65rem;

  letter-spacing:3px;

  color:rgba(255,255,255,.35);

  text-transform:uppercase;
}

/* ───────── CARD ───────── */

#card{
  position:fixed;

  top:50%;
  left:50%;

  transform:
  translate(-50%,-45%)
  scale(.9);

  width:min(90vw,500px);

  max-height:84vh;

  overflow-y:auto;

  background:rgba(5,10,22,.93);

  border:1px solid rgba(56,189,248,.35);

  border-radius:20px;

  backdrop-filter:blur(24px);

  padding:22px 18px;

  z-index:45;

  opacity:0;
  pointer-events:none;

  transition:
  opacity .5s,
  transform .5s;
}

#card.active{
  opacity:1;

  transform:
  translate(-50%,-50%)
  scale(1);

  pointer-events:auto;
}

.badge{
  display:inline-block;

  background:
  linear-gradient(90deg,#0284c7,#7c3aed);

  color:#fff;

  padding:5px 14px;

  border-radius:30px;

  font-size:.62rem;

  letter-spacing:2px;

  text-transform:uppercase;

  margin-bottom:15px;
}

#card h2{
  font-family:'Cinzel',serif;

  font-size:clamp(1.2rem,4vw,2rem);

  color:#fff;

  margin-bottom:14px;
}

.salutation{
  color:#fff;
  text-align:left;
  margin-bottom:10px;
}

.desc{
  color:#cbd5e1;
  text-align:left;
  line-height:1.6;
  font-size:.92rem;
}

.dbox{
  background:rgba(255,255,255,.03);

  border-left:4px solid #38bdf8;

  padding:14px;

  border-radius:12px;

  margin:18px 0;
}

.drow{
  display:flex;
  gap:8px;

  color:#cbd5e1;

  margin-bottom:10px;

  font-size:.9rem;
}

.drow:last-child{
  margin-bottom:0;
}

.dlabel{
  color:#38bdf8;
  font-weight:600;
}

.cbtn{
  width:100%;

  border:none;

  padding:13px 20px;

  border-radius:40px;

  background:
  linear-gradient(135deg,#38bdf8,#7c3aed);

  color:#fff;

  font-size:.95rem;

  letter-spacing:2px;

  text-transform:uppercase;

  cursor:pointer;
}

/* ───────── OUTRO ───────── */

#outro{
  position:fixed;

  top:50%;
  left:50%;

  transform:translate(-50%,-45%);

  text-align:center;

  z-index:50;

  opacity:0;

  transition:.5s;
}

#outro.active{
  opacity:1;

  transform:translate(-50%,-50%);
}

#rocket{
  display:block;

  font-size:4rem;

  margin-bottom:15px;
}

#rocket.go{
  animation:blastOff 1.5s forwards ease-in;
}

@keyframes blastOff{

  0%{
    transform:translateY(0);
    opacity:1;
  }

  100%{
    transform:translateY(-130vh) scale(1.8);
    opacity:0;
  }

}

#outro h2{
  color:#fff;
  font-family:'Cinzel',serif;
}

#outro p{
  color:#94a3b8;
  margin-top:8px;
}

/* hide labels */

.plabel{
  display:none;
}

</style>
</head>

<body>

<canvas id="starfield"></canvas>

<div id="solar">
<div style="position:relative;width:0;height:0;">

<div id="sun"></div>

<div class="oring oring-1"></div>
<div class="oring oring-2"></div>
<div class="oring oring-3"></div>
<div class="oring oring-4"></div>
<div class="oring oring-5"></div>
<div class="oring oring-6"></div>
<div class="oring oring-7"></div>
<div class="oring oring-8"></div>

<div class="parm parm-mercury">
<div class="pbody mercury-v" style="left:5vmin;"></div>
</div>

<div class="parm parm-venus">
<div class="pbody venus-v" style="left:7.5vmin;"></div>
</div>

<div class="parm parm-earth">
<div class="pbody earth-v" style="left:10vmin;"></div>
</div>

<div class="parm parm-mars">
<div class="pbody mars-v" style="left:13vmin;"></div>
</div>

<div class="parm parm-jupiter">
<div class="pbody jupiter-v" style="left:17vmin;"></div>
</div>

<div class="parm parm-saturn">
<div class="pbody saturn-v" style="left:21vmin;"></div>
</div>

<div class="parm parm-uranus">
<div class="pbody uranus-v" style="left:25vmin;"></div>
</div>

<div class="parm parm-neptune">
<div class="pbody neptune-v" style="left:29vmin;"></div>
</div>

</div>
</div>

<div id="inv-wrap">
<div id="inv-btn" onclick="openCard()">Invitation</div>
<div class="inv-line"></div>
<div class="inv-hint">tap to reveal</div>
</div>

<div id="card">

<div class="badge">Official Invitation</div>

<h2>Solar System Event</h2>

<div class="salutation">
Dear Sir/Madam,
</div>

<p class="desc">
You are invited to our special event.
Join us for a cosmic evening filled with creativity,
innovation and celebration.
</p>

<div class="dbox">

<div class="drow">
<span>⏰</span>
<span><span class="dlabel">Time:</span> 8am onwards</span>
</div>

<div class="drow">
<span>📍</span>
<span><span class="dlabel">Venue:</span> Auditorium</span>
</div>

</div>

<button class="cbtn" onclick="confirmSeat()">
Accept Invitation
</button>

</div>

<div id="outro">

<span id="rocket">🚀</span>

<h2>Seat Confirmed!</h2>

<p>Prepare for countdown.</p>

</div>

<script>

/* ───────── STARFIELD ───────── */

(function(){

const c=document.getElementById('starfield');
const ctx=c.getContext('2d');

function resize(){
  c.width=innerWidth;
  c.height=innerHeight;
}

resize();

window.addEventListener('resize',resize);

const stars=Array.from({length:260},()=>({
  x:Math.random()*innerWidth,
  y:Math.random()*innerHeight,
  r:Math.random()*1.5+.2,
  a:Math.random(),
  speed:Math.random()*.5+.1,
  ph:Math.random()*Math.PI*2
}));

function draw(t){

  ctx.clearRect(0,0,c.width,c.height);

  stars.forEach(s=>{

    const a=s.a*(.45+.55*Math.sin(t*s.speed+s.ph));

    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);

    ctx.fillStyle=`rgba(255,255,255,${a})`;

    ctx.fill();
  });

  requestAnimationFrame(t2=>draw(t2/1000));
}

requestAnimationFrame(t=>draw(t/1000));

})();

/* ───────── OPEN CARD ───────── */

window.addEventListener('DOMContentLoaded',()=>{

setTimeout(()=>{
  document.getElementById('inv-wrap')
  .classList.add('arrive');
},1200);

});

function openCard(){

const wrap=document.getElementById('inv-wrap');

wrap.style.opacity='0';

setTimeout(()=>{

wrap.style.display='none';

document.getElementById('card')
.classList.add('active');

},350);

}

function confirmSeat(){

document.getElementById('card')
.classList.remove('active');

setTimeout(()=>{

document.getElementById('outro')
.classList.add('active');

setTimeout(()=>{
  document.getElementById('rocket')
  .classList.add('go');
},400);

},600);

}

</script>

</body>
</html>
